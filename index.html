<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok OAuth Callback — GranaAmiga</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e6e6e6;
      max-width: 640px;
      margin: 40px auto;
      padding: 24px;
      line-height: 1.5;
    }
    h1 { color: #ff0050; font-size: 20px; margin: 0 0 4px; }
    .sub { color: #888; font-size: 13px; margin: 0 0 24px; }
    .card {
      background: #16161f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      background: #0a0a0f;
      color: #ff0050;
      border: 1px solid #2a2a35;
      border-radius: 4px;
      resize: vertical;
      word-break: break-all;
    }
    button {
      margin-top: 8px;
      padding: 10px 18px;
      background: #ff0050;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #e00046; }
    button:disabled { background: #444; cursor: default; }
    .error { color: #ff5050; }
    .ok { color: #50ff50; }
    .foot { font-size: 12px; color: #666; margin-top: 32px; text-align: center; }
  </style>
</head>
<body>
  <h1>TikTok OAuth Callback</h1>
  <p class="sub">GranaAmiga · uso interno · copie o code e cole no terminal ELISA</p>

  <div id="content"></div>

  <p class="foot">Se não caiu aqui pelo fluxo OAuth, feche esta aba.</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const errorDesc = params.get("error_description");
    const scopes = params.get("scopes");

    const c = document.getElementById("content");

    if (error) {
      c.innerHTML = `
        <div class="card">
          <div class="label error">Erro do TikTok</div>
          <p><strong>${error}</strong></p>
          <p>${errorDesc || "(sem descrição)"}</p>
        </div>
      `;
    } else if (code) {
      c.innerHTML = `
        <div class="card">
          <div class="label ok">✓ Authorization Code (cole no terminal)</div>
          <textarea readonly id="code">${code}</textarea>
          <button onclick="copiar('code', this)">Copiar code</button>
        </div>
        <div class="card">
          <div class="label">State (verificação)</div>
          <textarea readonly id="state">${state || "(sem state)"}</textarea>
        </div>
        ${scopes ? `<div class="card"><div class="label">Scopes autorizados</div><p>${scopes}</p></div>` : ""}
      `;
    } else {
      c.innerHTML = `
        <div class="card">
          <p>Nenhum <code>?code=</code> na URL. Esta página é o callback do fluxo OAuth do TikTok.</p>
        </div>
      `;
    }

    function copiar(id, btn) {
      const el = document.getElementById(id);
      el.select();
      document.execCommand("copy");
      navigator.clipboard.writeText(el.value).catch(() => {});
      btn.textContent = "Copiado ✓";
      btn.disabled = true;
      setTimeout(() => { btn.textContent = "Copiar code"; btn.disabled = false; }, 2000);
    }
  </script>
</body>
</html>
